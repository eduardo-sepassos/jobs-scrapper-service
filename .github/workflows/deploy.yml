name: Build and Deploy to K3s

on:
  push:
    branches: [ main ] # Triggers whenever you push to the main branch

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/JobsScrapper.Api/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USER }}/jobs-scrapper-service:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            NAMESPACE=jobs-scrapper-service
            sudo kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml get namespace "$NAMESPACE" >/dev/null 2>&1 || \
              sudo kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml create namespace "$NAMESPACE"
            cat <<EOF | sudo kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml apply -f -
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: jobs-scrapper-service
              namespace: jobs-scrapper-service
            spec:
              replicas: 1
              selector:
                matchLabels:
                  app: jobs-scrapper-service
              template:
                metadata:
                  labels:
                    app: jobs-scrapper-service
                spec:
                  containers:
                  - name: jobs-scrapper-service
                    image: ${{ secrets.DOCKER_USER }}/jobs-scrapper-service:latest
                    ports:
                    - containerPort: 8080
                    - containerPort: 8081
                    env:
                    - name: ASPNETCORE_ENVIRONMENT
                      value: Production
            ---
            apiVersion: v1
            kind: Service
            metadata:
              name: jobs-scrapper-service
              namespace: jobs-scrapper-service
            spec:
              selector:
                app: jobs-scrapper-service
              ports:
              - name: http
                port: 8080
                targetPort: 8080
              - name: https
                port: 8081
                targetPort: 8081
              type: ClusterIP
            EOF
            sudo kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml -n "$NAMESPACE" rollout restart deployment/jobs-scrapper-service